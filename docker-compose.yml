version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hageglede-app
    restart: unless-stopped
    volumes:
      - sqlite_data:/app/data
      - ./src/hageglede:/app/src/hageglede
    environment:
      - DATABASE_URL=sqlite:////app/data/hageglede.db
      - LOG_LEVEL=INFO
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hageglede.rule=Host(`hageglede.no`) || Host(`projects.vindingur.no`) && PathPrefix(`/hageglede`)"
      - "traefik.http.routers.hageglede.entrypoints=websecure"
      - "traefik.http.routers.hageglede.tls=true"
      - "traefik.http.routers.hageglede.tls.certresolver=letsencrypt"
      - "traefik.http.services.hageglede.loadbalancer.server.port=8000"
      - "traefik.http.routers.hageglede.middlewares=hageglede-stripprefix@file,hageglede-compress@file"
      - "traefik.http.middlewares.hageglede-stripprefix.stripprefix.prefixes=/hageglede"
      - "traefik.http.middlewares.hageglede-compress.compress=true"
      - "traefik.docker.network=traefik"

  traefik:
    image: traefik:v2.10
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./deploy/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./deploy/traefik/dynamic.yml:/etc/traefik/dynamic.yml:ro
      - traefik_certs:/etc/traefik/certs
      - traefik_logs:/var/log/traefik
    networks:
      - traefik
      - default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`traefik.hageglede.no`)"
      - "traefik.http.routers.api.service=api@internal"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls=true"
      - "traefik.http.routers.api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.api.middlewares=auth"

volumes:
  sqlite_data:
    driver: local
  traefik_certs:
    driver: local
  traefik_logs:
    driver: local

networks:
  traefik:
    external: true
    name: traefik