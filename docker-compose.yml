version: '3.8'

services:
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.dashboard=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.filename=/etc/traefik/dynamic.yml"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--certificatesresolvers.letsencrypt.acme.email=dev@vindingur.no"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "./deploy/traefik:/etc/traefik"
      - "traefik-letsencrypt:/letsencrypt"
    networks:
      - traefik-network

  hageglede:
    image: ghcr.io/vindingur/hageglede:latest
    container_name: hageglede
    restart: unless-stopped
    depends_on:
      - traefik
    environment:
      - DATABASE_URL=sqlite:///data/hageglede.db
    volumes:
      - hageglede-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hageglede.rule=PathPrefix(`/projects/hageplan`)"
      - "traefik.http.routers.hageglede.entrypoints=websecure"
      - "traefik.http.routers.hageglede.tls=true"
      - "traefik.http.routers.hageglede.tls.certresolver=letsencrypt"
      - "traefik.http.routers.hageglede.middlewares=strip-hageplan"
      - "traefik.http.middlewares.strip-hageplan.stripprefix.prefixes=/projects/hageplan"
      - "traefik.http.services.hageglede.loadbalancer.server.port=8000"
    networks:
      - traefik-network

volumes:
  traefik-letsencrypt:
  hageglede-data:

networks:
  traefik-network:
    external: true