http:
  routers:
    hageglede-main:
      rule: "Host(`hageplan.no`) || Host(`projects.vindingur.no`) && PathPrefix(`/hageplan`)"
      service: app-service
      entryPoints:
        - websecure
      middlewares:
        - strip-hageglede-prefix
        - compress
        - headers-default
      tls:
        certResolver: le

    hageglede-redirect:
      rule: "Host(`hageplan.no`) || Host(`projects.vindingur.no`) && PathPrefix(`/hageplan`)"
      entryPoints:
        - web
      middlewares:
        - redirect-to-https
      service: noop@internal

  services:
    app-service:
      loadBalancer:
        servers:
          - url: "http://app:8000"
        healthCheck:
          path: /health
          interval: 30s
          timeout: 5s

  middlewares:
    strip-hageglede-prefix:
      stripPrefix:
        prefixes:
          - "/hageglede"

    compress:
      compress: {}

    headers-default:
      headers:
        customRequestHeaders:
          X-Forwarded-Proto: "https"
        customResponseHeaders:
          X-Content-Type-Options: "nosniff"
          X-Frame-Options: "DENY"
          X-XSS-Protection: "1; mode=block"
        sslRedirect: true
        stsSeconds: 31536000
        stsIncludeSubdomains: true
        stsPreload: true

    redirect-to-https:
      redirectScheme:
        scheme: https
        permanent: true
